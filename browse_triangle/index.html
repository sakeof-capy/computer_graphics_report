<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebGPU Rotating Triangle</title>
</head>
<body>

<canvas id="c" width="800" height="600"></canvas>

<script type="module">
if (!navigator.gpu) {
    document.body.innerHTML = "WebGPU not supported";
    throw new Error("WebGPU not supported");
}

const canvas = document.getElementById("c");
const adapter = await navigator.gpu.requestAdapter();
if (!adapter) throw new Error("No GPU adapter found");
const device = await adapter.requestDevice();
const context = canvas.getContext("webgpu");
const format = navigator.gpu.getPreferredCanvasFormat();

context.configure({
    device,
    format,
    alphaMode: "opaque"
});

// Vertex positions
const positions = new Float32Array([
    0.0, 0.5,   // top
   -0.5,-0.5,   // left
    0.5,-0.5    // right
]);

// Vertex colors
const colors = new Float32Array([
    1.0, 0.0, 0.0,   // red
    0.0, 1.0, 0.0,   // green
    0.0, 0.0, 1.0    // blue
]);

// Create vertex buffers
const positionBuffer = device.createBuffer({
    size: positions.byteLength,
    usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
});
device.queue.writeBuffer(positionBuffer, 0, positions);

const colorBuffer = device.createBuffer({
    size: colors.byteLength,
    usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST
});
device.queue.writeBuffer(colorBuffer, 0, colors);

// Uniform buffer for rotation
const uniformBuffer = device.createBuffer({
    size: 4,
    usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST
});

const shader = device.createShaderModule({
code: `
struct Uniforms { angle : f32 }
@group(0) @binding(0) var<uniform> uniforms : Uniforms;

fn rotate(v: vec2f, a: f32) -> vec2f {
    let c = cos(a);
    let s = sin(a);
    return vec2f(
        v.x * c - v.y * s,
        v.x * s + v.y * c
    );
}

struct VSOut {
    @builtin(position) pos: vec4f,
    @location(0) color: vec3f,
};

@vertex
fn vs(@location(0) position: vec2f,
       @location(1) color: vec3f) -> VSOut {
    var out: VSOut;
    let p = rotate(position, uniforms.angle);
    out.pos = vec4f(p, 0.0, 1.0);
    out.color = color;
    return out;
}

@fragment
fn fs(@location(0) color: vec3f) -> @location(0) vec4f {
    return vec4f(color, 1.0);
}
`
});

const pipeline = device.createRenderPipeline({
    layout: "auto",
    vertex: {
        module: shader,
        entryPoint: "vs",
        buffers: [
            { arrayStride: 8, stepMode: "vertex", attributes: [{ shaderLocation:0, offset:0, format:"float32x2" }] },
            { arrayStride: 12, stepMode: "vertex", attributes: [{ shaderLocation:1, offset:0, format:"float32x3" }] }
        ]
    },
    fragment: {
        module: shader,
        entryPoint: "fs",
        targets: [{ format }]
    },
    primitive: { topology: "triangle-list" }
});

const bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [{ binding: 0, resource: { buffer: uniformBuffer } }]
});

let angle = 0;

function frame() {
    angle += 0.02;
    device.queue.writeBuffer(uniformBuffer, 0, new Float32Array([angle]));

    const encoder = device.createCommandEncoder();
    const pass = encoder.beginRenderPass({
        colorAttachments: [{
            view: context.getCurrentTexture().createView(),
            loadOp: "clear",
            clearValue: [0,0,0,1],
            storeOp: "store"
        }]
    });

    pass.setPipeline(pipeline);
    pass.setBindGroup(0, bindGroup);
    pass.setVertexBuffer(0, positionBuffer);
    pass.setVertexBuffer(1, colorBuffer);
    pass.draw(3);
    pass.end();

    device.queue.submit([encoder.finish()]);
    requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>

</body>
</html>
